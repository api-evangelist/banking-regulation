aid: banking-regulation
name: Banking Regulation
description: >-
  Banking regulation encompasses the rules, standards, and frameworks governing banks and
  financial institutions. Key frameworks include the Basel Accords (Basel I, II, III, IV)
  for capital adequacy, the Dodd-Frank Act in the US, PSD2 and CRD IV/V in Europe, and
  anti-money laundering (AML) / know-your-customer (KYC) requirements. Regulatory technology
  (RegTech) APIs and data services help financial institutions automate compliance reporting,
  risk management, and supervisory data submissions.
